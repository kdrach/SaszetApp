# docker-compose.prod.yml
# Production override for SaszetApp.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from the base compose:
# - Internal services have NO host port bindings (only nginx-proxy exposes 80/443)
# - All services use restart: always
# - Nginx reverse proxy + Certbot added
# - Shared saszet-network defined
# - certbot-conf and certbot-www volumes added for SSL

services:

  # ── Databases ──────────────────────────────────────────────────────────────
  app-db:
    ports: !override []
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  keycloak-db:
    ports: !override []
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Keycloak (production mode) ──────────────────────────────────────────────
  keycloak:
    command: start --import-realm
    ports: !override []
    environment:
      KC_HOSTNAME_URL: https://${KC_HOSTNAME:-auth.saszet.app}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM: "${SMTP_FROM}"
    volumes:
      - ./infrastructure/keycloak/admin-realm.json:/opt/keycloak/data/import/admin-realm.json:ro
      - ./infrastructure/keycloak/customer-realm.json:/opt/keycloak/data/import/customer-realm.json:ro
      - ./infrastructure/keycloak/themes:/opt/keycloak/themes:ro
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend-api:
    ports: !override []
    environment:
      - Cors__AllowedOrigins__0=https://${DOMAIN:-saszet.app}
      - Cors__AllowedOrigins__1=https://admin.${DOMAIN:-saszet.app}
      - Jwt__AdminAuthority=http://keycloak:8080/realms/petfood-admin-realm
      - Jwt__CustomerAuthority=http://keycloak:8080/realms/petfood-customer-realm
      - Jwt__ValidIssuerAdmin=https://auth.${DOMAIN:-saszet.app}/realms/petfood-admin-realm
      - Jwt__ValidIssuerCustomer=https://auth.${DOMAIN:-saszet.app}/realms/petfood-customer-realm
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend Mobile PWA ─────────────────────────────────────────────────────
  frontend-mobile:
    ports: !override []
    volumes:
      - ./frontend-mobile/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend Admin PWA ──────────────────────────────────────────────────────
  frontend-admin:
    ports: !override []
    volumes:
      - ./frontend-admin/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Caddy (Auto HTTPS Reverse Proxy) ────────────────────────────────────────
  caddy:
    image: caddy:alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-saszet.app}
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend-api
      - frontend-mobile
      - frontend-admin
      - keycloak
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - saszet-network

# ── Shared Networks ─────────────────────────────────────────────────────────
networks:
  saszet-network:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  caddy_data:
  caddy_config:
