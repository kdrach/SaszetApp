services:
  app-db:
    image: postgres:16-alpine
    container_name: app-db
    environment:
      POSTGRES_USER: saszetapp_user
      POSTGRES_PASSWORD: saszetapp_password
      POSTGRES_DB: saszetapp_db
    ports:
      - "5434:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saszetapp_user -d saszetapp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password
      POSTGRES_DB: keycloak_db
    ports:
      - "5433:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak_user -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped

  backend-api:
    build:
      context: ./backend/SaszetApp.Api
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=app-db;Database=saszetapp_db;Username=saszetapp_user;Password=saszetapp_password
      - Jwt__Authority=http://keycloak:8080/realms/petfood-realm
      - ENCRYPTION_KEY=supersecretencryptionkey123456789012 # 32 bytes for AES-256
      - ASPNETCORE_HTTP_PORTS=8080
    depends_on:
      app-db:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

  frontend-mobile:
    build:
      context: ./frontend-mobile
      dockerfile: Dockerfile
    container_name: frontend-mobile
    ports:
      - "3010:80"
    depends_on:
      - backend-api
    restart: unless-stopped

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: frontend-admin
    ports:
      - "3011:80"
    depends_on:
      - backend-api
    restart: unless-stopped

volumes:
  app-db-data:
  keycloak-db-data:
