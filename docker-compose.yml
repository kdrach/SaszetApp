services:
  app-db:
    image: postgres:16-alpine
    container_name: app-db
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports:
      - "5434:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_USER: "${KEYCLOAK_USER}"
      POSTGRES_PASSWORD: "${KEYCLOAK_PASSWORD}"
      POSTGRES_DB: "${KEYCLOAK_DB}"
    ports:
      - "5433:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB}"
      KC_DB_USERNAME: "${KEYCLOAK_USER}"
      KC_DB_PASSWORD: "${KEYCLOAK_PASSWORD}"
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME_URL: http://localhost:8180
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM: "${SMTP_FROM}"
    ports:
      - "8180:8080"
    volumes:
      - ./infrastructure/keycloak/admin-realm.json:/opt/keycloak/data/import/admin-realm.json:ro
      - ./infrastructure/keycloak/customer-realm.json:/opt/keycloak/data/import/customer-realm.json:ro
      - ./infrastructure/keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e \"GET /health/ready HTTP/1.1\\r\\nhost: http://localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3;grep \"200 OK\"  <&3"]
      interval: 10s
      timeout: 5s
      retries: 15

  backend-api:
    build:
      context: ./backend/SaszetApp.Api
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "5000:8080"
    environment:
      - "ConnectionStrings__DefaultConnection=Host=app-db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      - Jwt__AdminAuthority=http://keycloak:8080/realms/petfood-admin-realm
      - Jwt__CustomerAuthority=http://keycloak:8080/realms/petfood-customer-realm
      - Jwt__ValidIssuerAdmin=http://localhost:8180/realms/petfood-admin-realm
      - Jwt__ValidIssuerCustomer=http://localhost:8180/realms/petfood-customer-realm
      - "ENCRYPTION_KEY=${ENCRYPTION_KEY}" # 32 bytes for AES-256
      - ASPNETCORE_HTTP_PORTS=8080
    depends_on:
      app-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend-mobile:
    build:
      context: ./frontend-mobile
      dockerfile: Dockerfile
      args:
        VITE_MODE: development
    container_name: frontend-mobile
    ports:
      - "3010:80"
    depends_on:
      backend-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        VITE_MODE: development
    container_name: frontend-admin
    ports:
      - "3011:80"
    depends_on:
      backend-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-db-data:
  keycloak-db-data:
