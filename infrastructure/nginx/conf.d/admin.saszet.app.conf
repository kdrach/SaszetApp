# admin.saszet.app — Admin Gateway (desktop PWA)

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name admin.saszet.app;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name admin.saszet.app;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/admin.saszet.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.saszet.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Proxy to frontend-admin container
    location / {
        proxy_pass         http://frontend-admin:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }
}
