# auth.saszet.app — Keycloak Identity Provider
# WebSocket support required for Keycloak admin console

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name auth.saszet.app;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name auth.saszet.app;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/auth.saszet.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.saszet.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Proxy to Keycloak container — WebSocket support for admin console
    location / {
        set $upstream http://keycloak:8080;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # WebSocket upgrade headers (required for Keycloak admin console)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
        proxy_busy_buffers_size 256k;
    }
}
