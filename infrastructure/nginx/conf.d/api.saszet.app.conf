# api.saszet.app — Backend REST API (.NET)
# Larger client_max_body_size for ingredient label image uploads

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.saszet.app;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name api.saszet.app;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.saszet.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.saszet.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow larger body for ingredient label image uploads
    client_max_body_size 10M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Proxy to backend-api container
    location / {
        set $upstream http://backend-api:8080;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }
}
